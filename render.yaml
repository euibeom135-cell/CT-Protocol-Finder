services:
  - type: web
    name: cp-protocol-finder
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_CP_ADVISORY_MODEL
        value: gpt-4o
      - key: PYTHON_VERSION
        value: 3.11.6
